<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ephemeral Chat</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        background: #f5f5f5;
      }

      .app {
        max-width: 720px;
        height: 100vh;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        background: white;
        border-left: 1px solid #ddd;
        border-right: 1px solid #ddd;
      }

      header {
        padding: 16px;
        border-bottom: 1px solid #ddd;
      }

      header h1 {
        margin: 0;
        font-size: 20px;
      }

      header p {
        margin: 6px 0 0;
        color: #666;
        font-size: 14px;
      }

      .join-screen {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .join-card {
        width: 100%;
        max-width: 420px;
        padding: 24px;
        border: 1px solid #ddd;
        border-radius: 16px;
        background: #fff;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
      }

      .join-card h2 {
        margin: 0 0 8px;
      }

      .join-card p {
        margin: 0 0 16px;
        color: #666;
      }

      .chat-screen {
        flex: 1;
        min-height: 0;
        display: none;
        flex-direction: column;
      }

      #messages {
        flex: 1;
        list-style: none;
        padding: 16px;
        margin: 0;
        overflow-y: auto;
      }

      #messages li {
        padding: 10px 12px;
        margin-bottom: 10px;
        background: #f0f0f0;
        border-radius: 12px;
        word-break: break-word;
      }

      .message-header {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 4px;
      }

      .username {
        font-weight: 700;
      }

      .timestamp {
        color: #777;
        font-size: 12px;
      }

      .message-text {
        white-space: pre-wrap;
      }

      form {
        display: flex;
        gap: 8px;
      }

      .message-form {
        padding: 16px;
        border-top: 1px solid #ddd;
      }

      input {
        flex: 1;
        min-width: 0;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 16px;
      }

      button {
        padding: 12px 16px;
        border: 0;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header>
        <h1>Ephemeral Chat</h1>
        <p>You only see messages sent while this page is open.</p>
      </header>

      <section id="join-screen" class="join-screen">
        <div class="join-card">
          <h2>Join chat</h2>
          <p>Choose a display name for this tab.</p>
          <form id="join-form">
            <input id="username-input" autocomplete="off" maxlength="32" placeholder="Your name..." />
            <button type="submit">Join</button>
          </form>
        </div>
      </section>

      <section id="chat-screen" class="chat-screen">
        <ul id="messages"></ul>

        <form id="message-form" class="message-form">
          <input id="message-input" autocomplete="off" maxlength="500" placeholder="Type a message..." />
          <button type="submit">Send</button>
        </form>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();

      const joinScreen = document.getElementById("join-screen");
      const chatScreen = document.getElementById("chat-screen");
      const joinForm = document.getElementById("join-form");
      const usernameInput = document.getElementById("username-input");
      const messageForm = document.getElementById("message-form");
      const messageInput = document.getElementById("message-input");
      const messages = document.getElementById("messages");

      let username = "";

      joinForm.addEventListener("submit", (event) => {
        event.preventDefault();

        username = usernameInput.value.trim().slice(0, 32);
        if (!username) return;

        joinScreen.style.display = "none";
        chatScreen.style.display = "flex";
        messageInput.focus();
      });

      messageForm.addEventListener("submit", (event) => {
        event.preventDefault();

        const message = messageInput.value.trim();
        if (!username || !message) return;

        socket.emit("chat message", { username, message });
        messageInput.value = "";
        messageInput.focus();
      });

      socket.on("chat message", ({ username, message, sentAt }) => {
        const item = document.createElement("li");

        const header = document.createElement("div");
        header.className = "message-header";

        const userTag = document.createElement("span");
        userTag.className = "username";
        userTag.textContent = username;

        const timestamp = document.createElement("span");
        timestamp.className = "timestamp";
        timestamp.textContent = formatTime(sentAt);

        const body = document.createElement("div");
        body.className = "message-text";
        body.textContent = message;

        header.appendChild(userTag);
        header.appendChild(timestamp);
        item.appendChild(header);
        item.appendChild(body);
        messages.appendChild(item);
        messages.scrollTop = messages.scrollHeight;
      });

      function formatTime(value) {
        const date = value ? new Date(value) : new Date();
        return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }
    </script>
  </body>
</html>
