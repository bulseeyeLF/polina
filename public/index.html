<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ephemeral Chat</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        background: #f5f5f5;
      }

      .app {
        max-width: 720px;
        height: 100vh;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        background: white;
        border-left: 1px solid #ddd;
        border-right: 1px solid #ddd;
      }

      header {
        padding: 16px;
        border-bottom: 1px solid #ddd;
      }

      header h1 {
        margin: 0;
        font-size: 20px;
      }

      header p {
        margin: 6px 0 0;
        color: #666;
        font-size: 14px;
      }

      #messages {
        flex: 1;
        list-style: none;
        padding: 16px;
        margin: 0;
        overflow-y: auto;
      }

      #messages li {
        padding: 10px 12px;
        margin-bottom: 8px;
        background: #f0f0f0;
        border-radius: 10px;
        word-break: break-word;
      }

      form {
        display: flex;
        gap: 8px;
        padding: 16px;
        border-top: 1px solid #ddd;
      }

      input {
        flex: 1;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 16px;
      }

      button {
        padding: 12px 16px;
        border: 0;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header>
        <h1>Ephemeral Chat</h1>
        <p>You only see messages sent while this page is open.</p>
      </header>

      <ul id="messages"></ul>

      <form id="form">
        <input id="input" autocomplete="off" maxlength="500" placeholder="Type a message..." />
        <button type="submit">Send</button>
      </form>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const messages = document.getElementById("messages");

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        const message = input.value.trim();
        if (!message) return;

        socket.emit("chat message", message);
        input.value = "";
        input.focus();
      });

      socket.on("chat message", (message) => {
        const item = document.createElement("li");
        item.textContent = message;
        messages.appendChild(item);
        messages.scrollTop = messages.scrollHeight;
      });
    </script>
  </body>
</html>
